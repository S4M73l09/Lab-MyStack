services:
  app:
    image: basic-app-db:latest
    build:
      context: ./app-db
      dockerfile: Dockerfile
    container_name: secrets-app
    ports:
      - "5003:5000"
    env_file:
      - ./secrets/.env
    volumes:
      - ./secrets/app_password.txt:/run/secrets/app_password:ro
    command: >
      sh -c 'export POSTGRES_PASSWORD="$$(cat /run/secrets/app_password)" && python app.py'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:17.10-alpine@sha256:5a6fcbc5d93831991d2386fa634509b3c49a1ac5ffb70c13c2322840f821d7e7
    container_name: secrets-postgres
    env_file:
      - ./secrets/.env
    volumes:
      - secrets_db_data:/var/lib/postgresql/data
      - ./secrets/db_password.txt:/run/secrets/db_password:ro
    command: >
      sh -c 'export POSTGRES_PASSWORD="$$(cat /run/secrets/db_password)" && exec docker-entrypoint.sh postgres'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practice_user -d practice_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  secrets_db_data: