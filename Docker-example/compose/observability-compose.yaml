services:
  # Servicio de Prometheus + Tag-Digest
  prometheus:
    image: prom/prometheus:v3.5.4@sha256:4aee33e4b869272292ebb6857d39c102e5b7f532599053710cfd113491162560
    container_name: basic-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Servicio de Grafana + Tag-Digest
  grafana:
    image: grafana/grafana:12.4.4@sha256:7e1253b79aa1303da70451a7ff9214840cf54bd4214e5fdb61765f8ffe7dd867
    container_name: basic-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

# Volumenes para Prometheus y Grafana
volumes:
  prometheus_data:
  grafana_data: