name: Basic-ci-python

on:
  push:
    branches: 
      - main
  workflow_dispatch:

  pull_request:

# permissions se encarga de los permisos del workflow, esto incluye el uso de crear credenciales, como el OIDC de Azure/GCP.

permissions:
  contents: read
  id-token: write

# Concurrency añade justamente que solo un workflow pueda funcionar, esto nos permite mayor control.

concurrency: 
  group: Basic-ci-python-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  test-pipeline-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff

      - name: Run linter
        run: ruff check .

      - name: Run tests
        run: PYTHONPATH=. pytest -q
