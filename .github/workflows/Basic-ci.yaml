name: Basic-ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show current branch
        run: 'echo "Branch: ${{ github.ref }}" '

      - name: List files
        run: ls -la

      - name: Run fake test
        run: echo "Tests passed"


