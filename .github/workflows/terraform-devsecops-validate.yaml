name: terraform-devsecops-validate

on:
  push:
    branches:
      - main
    paths:
      - 'Terraform-example/basic/**'
      - '.github/workflows/terraform-devsecops-validate.yaml'
  pull_request:
    paths:
      - 'Terraform-example/basic/**'
      - '.github/workflows/terraform-devsecops-validate.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-devsecops-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
# Job de los pasos de DevSecOps para asegurar pasos de Terraform
  devsecops-practice:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Terraform-example/basic

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ejecutar Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: Terraform-example/basic
          quiet: false

      - name: Install Conftest
        run: |
          curl -L -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.59.0/conftest_0.59.0_Linux_x86_64.tar.gz
          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/conftest

      - name: Run conftest policies on Terraform version constraints
        run: conftest test main.tf --policy ../../DevSecOps-example/OPA-Conftest/terraform/version

      - name: Run conftest policies on Terraform variable description
        run: conftest test variables.tf --policy ../../DevSecOps-example/OPA-Conftest/terraform/variables

        # Se añade scan-type: escanea filesystem - scan-ref: escanea la ruta objetiva
      - name: Run trivy filesystem scan on Terraform
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: Terraform-example/basic
          format: table
          output: trivy-Terraform-report.txt
          exit-code: '0'
          severity: HIGH,CRITICAL

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-Terraform-report
          path: trivy-Terraform-report.txt
          retention-days: 1

# Job de Terraform, encargado de hacer el plan, el apply se haria en otro job
  terraform-validate:
    runs-on: ubuntu-latest
    needs: devsecops-practice
    defaults:
      run:
        working-directory: Terraform-example/basic

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

        # TFLint se encarga de verificar sintaxis.
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: Init TFLint plugins
        run: tflint --init

      - name: Show TFLint version
        run: tflint --version

      - name: Run TFLint
        run: tflint --format compact

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -var-file="terraform.tfvars.example" -out=tfplan

      - name: Export Terraform plan to text
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Compress Terraform plan
        run: zip tfplan.zip tfplan tfplan.txt

      - name: Upload tfplan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: Terraform-example/basic/tfplan.zip
          retention-days: 1

